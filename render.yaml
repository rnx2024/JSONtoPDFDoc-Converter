services:
  - type: web
    name: my-fastapi-app
    env: docker
    repo: https://github.com/rnx2024/JSONtoPDFDoc-Converter
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    buildCommand: ""     # optional override
    startCommand: ""     # optional override
    autoDeploy: true     # enable auto-deploy
    pullRequestPreviewsEnabled: true
    envVars:
      - key: ENV
        value: production
      - key: REDIS_URL
        sync: false       # mark as secret, set in Render dashboard
      - key: API_KEY
        sync: false       # mark as secret, set in Render dashboard
      - key: SENTRY_DSN
        sync: false       # optional; leave unset to disable Sentry
